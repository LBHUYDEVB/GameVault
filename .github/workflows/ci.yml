name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_PATH: /tmp/gamevault-ci.db
      DATABASE_URL: file:/tmp/gamevault-ci.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Validate Docker Compose
        run: APP_PASSWORD=ci-only docker compose --env-file .env.docker.example config --quiet

      - name: Build Docker image
        run: docker build --tag gamevault:ci .
